<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUP-PHOTO — Mon Dossier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; }
    nav { background: #1a1a24; border-bottom: 1px solid #2a2a3a; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    nav h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .logout-btn { background: none; border: 1px solid #2a2a3a; color: #aaa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    main { padding: 32px 24px; max-width: 800px; margin: 0 auto; }
    h2 { font-size: 20px; margin-bottom: 24px; color: #fff; }
    .section { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .section h3 { font-size: 15px; color: #a78bfa; margin-bottom: 16px; font-weight: 600; }
    .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e1e2a; font-size: 14px; }
    .row:last-child { border-bottom: none; }
    .row .k { color: #888; }
    .row .v { color: #e0e0e0; font-weight: 500; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.en_cours { background: #78350f33; color: #fbbf24; border: 1px solid #78350f88; }
    .badge.complet  { background: #065f4633; color: #34d399; border: 1px solid #065f4688; }
    .badge.valide   { background: #1e3a5f33; color: #60a5fa; border: 1px solid #1e3a5f88; }
    .visite { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e1e2a; }
    .visite:last-child { border-bottom: none; }
    .visite-num { background: #7c3aed33; color: #a78bfa; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
  </style>
</head>
<body>
  <nav>
    <h1>📷 SUP-PHOTO — Mon Dossier</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="/etudiant/fdr.html" style="color:#a78bfa;font-size:13px;text-decoration:none;padding:6px 14px;border:1px solid #3a2a5a;border-radius:6px;">Ma FDR</a>
      <a href="/etudiant/cerfa.html" style="color:#a78bfa;font-size:13px;text-decoration:none;padding:6px 14px;border:1px solid #3a2a5a;border-radius:6px;">CERFA &amp; Signatures</a>
      <a href="/etudiant/mon-profil.html" style="color:#a78bfa;font-size:13px;text-decoration:none;padding:6px 14px;border:1px solid #3a2a5a;border-radius:6px;">Mon profil</a>
      <button class="logout-btn" onclick="API.logout()">Déconnexion</button>
    </div>
  </nav>

  <main id="main">
    <p style="color:#555;text-align:center;margin-top:60px">Chargement…</p>
  </main>

  <script src="/etudiant/api.js"></script>
  <script>
    if (!API.requireRole('etudiant')) throw new Error();

    API.get('/api/etudiant/dossier').then(data => {
      const main = document.getElementById('main');
      const d = data.dossier || {};
      const fdr = d.fdr_json ? JSON.parse(d.fdr_json) : {};
      const visites = data.visites || [];

      main.innerHTML = `
        <h2>${data.prenom} ${data.nom}</h2>

        <div class="section">
          <h3>Statut du dossier</h3>
          <div class="row">
            <span class="k">Promotion</span>
            <span class="v">${d.annee_promo || '—'}</span>
          </div>
          <div class="row">
            <span class="k">Statut</span>
            <span class="badge ${d.statut || 'en_cours'}">${d.statut || 'en_cours'}</span>
          </div>
          <div class="row">
            <span class="k">Dernière mise à jour</span>
            <span class="v">${d.updated_at ? d.updated_at.slice(0,10) : '—'}</span>
          </div>
        </div>

        <div class="section">
          <h3>Informations personnelles</h3>
          ${row('Email', data.mail)}
          ${row('Téléphone', data.tel)}
          ${row('Date de naissance', data.ddn)}
          ${row('Adresse', data.adresse)}
          ${row('Statut avant contrat', data.statut_avant)}
        </div>

        <div class="section">
          <h3>Contrat</h3>
          ${row('Type de contrat', data.type_contrat)}
          ${row('Date de début', data.date_debut)}
          ${row('Date de fin', data.date_fin)}
          ${row('Salaire mensuel', data.salaire ? data.salaire + ' €' : null)}
        </div>

        ${data.entreprise ? `
        <div class="section">
          <h3>Entreprise d'accueil</h3>
          ${row('Raison sociale', data.entreprise.raison_sociale)}
          ${row('Tuteur', data.entreprise.tuteur_prenom + ' ' + data.entreprise.tuteur_nom)}
          ${row('Fonction tuteur', data.entreprise.tuteur_fonction)}
          ${row('Téléphone', data.entreprise.tel)}
          ${row('Email', data.entreprise.mail)}
          ${row('Score conformité', data.entreprise.score_conformite + '/100')}
        </div>` : ''}

        <div class="section">
          <h3>Visites entreprise (${visites.filter(v => v.statut === 'faite').length}/4 effectuées)</h3>
          ${[1,2,3,4].map(n => {
            const v = visites.find(x => x.numero === n);
            return `<div class="visite">
              <div style="display:flex;align-items:center;gap:12px">
                <div class="visite-num">${n}</div>
                <div>
                  <div style="font-size:14px;font-weight:500">Visite ${n}</div>
                  <div style="font-size:12px;color:#666">${v && v.date_visite ? v.date_visite : 'Non planifiée'}</div>
                </div>
              </div>
              <span class="badge ${v ? v.statut : 'en_cours'}">${v ? v.statut : 'planifiee'}</span>
            </div>`;
          }).join('')}
        </div>
      `;
    }).catch(() => {
      document.getElementById('main').innerHTML = '<p style="color:#f87171;text-align:center;margin-top:60px">Erreur de chargement</p>';
    });

    function row(label, val) {
      return `<div class="row"><span class="k">${label}</span><span class="v">${val || '—'}</span></div>`;
    }
  </script>
</body>
</html>
