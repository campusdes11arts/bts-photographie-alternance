<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUP-PHOTO — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,.5); }
    h1 { font-size: 20px; color: #fff; text-align: center; margin-bottom: 8px; }
    .sub { text-align: center; color: #555; font-size: 13px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    input { width: 100%; background: #111118; border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 15px; outline: none; margin-bottom: 18px; }
    input:focus { border-color: #7c3aed; }
    button { width: 100%; background: #7c3aed; color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #6d28d9; }
    .error { background: #7f1d1d33; border: 1px solid #ef444455; color: #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📷 SUP-PHOTO</h1>
    <p class="sub">Administration</p>
    <div class="error" id="err"></div>
    <form id="form">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@sup-photo.fr" required>
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" required>
      <button type="submit" id="btn">Se connecter</button>
    </form>
  </div>
  <script src="/admin/api.js"></script>
  <script>
    const user = API.currentUser();
    if (user && API.token() && user.role === 'admin') window.location.href = '/admin/dashboard.html';

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Connexion…';
      try {
        const data = await API.login(document.getElementById('email').value, document.getElementById('password').value);
        if (data.error) throw new Error(data.error);
        if (data.user.role !== 'admin') throw new Error('Accès réservé aux administrateurs');
        window.location.href = '/admin/dashboard.html';
      } catch(ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
