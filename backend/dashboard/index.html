<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUP-PHOTO — Dashboard Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
    }

    nav {
      background: #1a1a24;
      border-bottom: 1px solid #2a2a3a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav h1 { font-size: 16px; font-weight: 700; color: #fff; }
    nav span { font-size: 13px; color: #888; }

    .logout-btn {
      background: none;
      border: 1px solid #2a2a3a;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .logout-btn:hover { color: #fff; border-color: #555; }

    main { padding: 32px 24px; max-width: 1100px; margin: 0 auto; }

    h2 { font-size: 20px; margin-bottom: 20px; color: #fff; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 20px;
    }

    .stat-card .label { font-size: 12px; color: #777; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 36px; font-weight: 700; color: #fff; margin-top: 6px; }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .btn {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #6d28d9; }
    .btn.secondary { background: #1a1a24; border: 1px solid #2a2a3a; color: #ccc; }
    .btn.secondary:hover { border-color: #555; color: #fff; }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 12px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a3a;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #1e1e2a;
      font-size: 14px;
    }
    tr:hover td { background: #1a1a24; }

    .badge-statut {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-statut.en_cours  { background: #78350f33; color: #fbbf24; border: 1px solid #78350f88; }
    .badge-statut.complet   { background: #065f4633; color: #34d399; border: 1px solid #065f4688; }
    .badge-statut.valide    { background: #1e3a5f33; color: #60a5fa; border: 1px solid #1e3a5f88; }

    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 32px;
      width: 480px;
      max-width: 95vw;
    }
    .modal h3 { margin-bottom: 20px; color: #fff; }
    .modal label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; }
    .modal input, .modal select {
      width: 100%; background: #111118; border: 1px solid #2a2a3a;
      border-radius: 7px; padding: 10px 12px; color: #fff; font-size: 14px;
      margin-bottom: 14px; outline: none;
    }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  </style>
</head>
<body>
  <nav>
    <h1>📷 SUP-PHOTO — Administration</h1>
    <div style="display:flex;align-items:center;gap:16px">
      <span id="userInfo"></span>
      <button class="logout-btn" onclick="API.logout()">Déconnexion</button>
    </div>
  </nav>

  <main>
    <h2>Tableau de bord</h2>

    <div class="stats" id="stats">
      <div class="stat-card"><div class="label">Total dossiers</div><div class="value" id="s-total">—</div></div>
      <div class="stat-card"><div class="label">Complets</div><div class="value" id="s-complets">—</div></div>
      <div class="stat-card"><div class="label">Validés</div><div class="value" id="s-valides">—</div></div>
      <div class="stat-card"><div class="label">Visites effectuées</div><div class="value" id="s-visites">—</div></div>
    </div>

    <div class="actions">
      <button class="btn" onclick="openModal('etudiant')">+ Ajouter un étudiant</button>
      <button class="btn secondary" onclick="openModal('entreprise')">+ Ajouter une entreprise</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Étudiant</th>
          <th>Email</th>
          <th>Entreprise</th>
          <th>Promo</th>
          <th>Statut</th>
          <th>Mis à jour</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" style="color:#555;text-align:center;padding:32px">Chargement…</td></tr>
      </tbody>
    </table>
  </main>

  <!-- Modal étudiant -->
  <div class="modal-bg" id="modal-etudiant">
    <div class="modal">
      <h3>Nouvel étudiant</h3>
      <label>Prénom</label><input id="e-prenom" placeholder="Prénom">
      <label>Nom</label><input id="e-nom" placeholder="Nom">
      <label>Email de connexion</label><input id="e-email" type="email" placeholder="etudiant@email.com">
      <label>Mot de passe provisoire</label><input id="e-password" type="password" placeholder="••••••••">
      <label>Promotion</label><input id="e-promo" placeholder="2025-2027">
      <div id="e-error" style="color:#fca5a5;font-size:13px;margin-bottom:10px;display:none"></div>
      <div class="modal-footer">
        <button class="btn secondary" onclick="closeModal('etudiant')">Annuler</button>
        <button class="btn" onclick="createEtudiant()">Créer</button>
      </div>
    </div>
  </div>

  <!-- Modal entreprise -->
  <div class="modal-bg" id="modal-entreprise">
    <div class="modal">
      <h3>Nouvelle entreprise</h3>
      <label>Raison sociale</label><input id="en-raison" placeholder="Nom de l'entreprise">
      <label>Email de connexion</label><input id="en-email" type="email" placeholder="contact@entreprise.fr">
      <label>Mot de passe provisoire</label><input id="en-password" type="password" placeholder="••••••••">
      <label>SIRET</label><input id="en-siret" placeholder="12345678901234">
      <div id="en-error" style="color:#fca5a5;font-size:13px;margin-bottom:10px;display:none"></div>
      <div class="modal-footer">
        <button class="btn secondary" onclick="closeModal('entreprise')">Annuler</button>
        <button class="btn" onclick="createEntreprise()">Créer</button>
      </div>
    </div>
  </div>

  <script src="/admin/api.js"></script>
  <script>
    if (!API.requireRole('admin')) throw new Error('Non autorisé');

    const u = API.currentUser();
    document.getElementById('userInfo').textContent = u.email;

    async function loadData() {
      const [stats, etudiants] = await Promise.all([
        API.get('/api/admin/stats'),
        API.get('/api/admin/etudiants')
      ]);

      document.getElementById('s-total').textContent   = stats.total;
      document.getElementById('s-complets').textContent = stats.complets;
      document.getElementById('s-valides').textContent  = stats.valides;
      document.getElementById('s-visites').textContent  = stats.visites;

      const tbody = document.getElementById('tbody');
      if (!etudiants.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:#555;text-align:center;padding:32px">Aucun dossier</td></tr>';
        return;
      }
      tbody.innerHTML = etudiants.map(e => `
        <tr style="cursor:pointer" onclick="window.location='/admin/dossier.html?id=${e.id}'">
          <td>${e.prenom} ${e.nom}</td>
          <td style="color:#888">${e.email || '—'}</td>
          <td>${e.raison_sociale || '—'}</td>
          <td>${e.annee_promo || '—'}</td>
          <td><span class="badge-statut ${e.statut || 'en_cours'}">${e.statut || 'en_cours'}</span></td>
          <td style="color:#666">${e.updated_at ? e.updated_at.slice(0,10) : '—'}</td>
        </tr>
      `).join('');
    }

    function openModal(type) { document.getElementById('modal-' + type).classList.add('open'); }
    function closeModal(type) { document.getElementById('modal-' + type).classList.remove('open'); }

    async function createEtudiant() {
      const err = document.getElementById('e-error');
      err.style.display = 'none';
      try {
        await API.post('/api/admin/etudiants', {
          prenom:      document.getElementById('e-prenom').value,
          nom:         document.getElementById('e-nom').value,
          email:       document.getElementById('e-email').value,
          password:    document.getElementById('e-password').value,
          annee_promo: document.getElementById('e-promo').value
        });
        closeModal('etudiant');
        loadData();
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
      }
    }

    async function createEntreprise() {
      const err = document.getElementById('en-error');
      err.style.display = 'none';
      try {
        await API.post('/api/admin/entreprises', {
          raison_sociale: document.getElementById('en-raison').value,
          email:          document.getElementById('en-email').value,
          password:       document.getElementById('en-password').value,
          siret:          document.getElementById('en-siret').value
        });
        closeModal('entreprise');
        loadData();
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
      }
    }

    loadData();
  </script>
</body>
</html>
